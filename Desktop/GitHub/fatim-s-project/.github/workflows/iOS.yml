name: iOS Archive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  archive:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project files
        run: ls -R

      - name: List schemes
        run: xcodebuild -project fm.xcodeproj -list

      - name: Archive app
        run: |
          mkdir -p build

          xcodebuild archive \
            -project fm.xcodeproj \
            -scheme fm \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/fm.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: fm.xcarchive
          path: build/fm.xcarchive
