
name: Build and Archive iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger this build manually

jobs:
  build:
    name: Build & Archive App
    runs-on: macos-latest # Runs on GitHub's macOS machines with Xcode installed

    steps:
      # 1. Checkout your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Select the correct Xcode version (Optional, default is latest)
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. Build and Archive the iOS App
      # Replace 'fm' with your exact scheme name if it's different!
      - name: Create Xcode Archive
        run: |
          xcodebuild archive \
            -project fm.xcodeproj \
            -scheme fm \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/fm.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      # 4. Zip up the archive so it can be uploaded
      - name: Compress Archive
        run: |
          cd $RUNNER_TEMP
          zip -r fm.xcarchive.zip fm.xcarchive

      # 5. Upload the zipped archive to GitHub Actions artifacts
      - name: Upload Archive to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-Archive
          path: ${{ runner.temp }}/fm.xcarchive.zip
