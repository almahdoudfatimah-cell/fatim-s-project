name: Node.js CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      # The matrix runs your steps concurrently for each version specified below
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See Node.js release schedule to adjust these as needed

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # Enables aggressive caching for npm dependencies to speed up your workflow
        cache: 'npm'

    - name: Install dependencies
      # 'npm ci' is preferred in CI environments over 'npm install' because
      # it strictly installs versions from package-lock.json and is faster
      run: npm ci

    - name: Run linter (Optional)
      # If your package.json has a lint script, uncomment the line below
      # run: npm run lint --if-present

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build --if-present
